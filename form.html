<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表單練習</title>
</head>
<body>
    <!-- method="post" 有後端才能使用到 -->
    <form action="">
        <label for="username">使用者名稱：</label>
        <input required type="text" id="username" name="username" placeholder="不可輸入特殊符號">
        <br>
        <label for="age">使用者年齡：</label>
        <input type="number" id="age" name="age" placeholder="">
        <br>
        <label for="email">使用者信箱：</label>
        <input required type="email" id="email" name="email" placeholder="">
        <br>
        <label for="password">使用者密碼：</label>
        <input required type="password" id="password" name="password" placeholder="英文+數字，共8碼">

        <br>
        <button type="submit">註冊</button>


    </form>


</body>
</html>
